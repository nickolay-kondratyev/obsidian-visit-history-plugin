<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="642" viewBox="0 0 1000 642" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <!-- Illustrative sample of the Visit History heatmap. Standalone: literal hex only,
       no scripts / foreignObject / external refs. Nature gradient, coloured by "last visited".
       Colour meaning: brighter green = visited recently, deep blue = long ago, dim = no data. -->

  <!-- page background (Obsidian dark) -->
  <rect x="0" y="0" width="1000" height="642" fill="#1e1e1e"/>

  <!-- ===== header bar (42px) ===== -->
  <rect x="0" y="0" width="1000" height="42" fill="#262626"/>
  <rect x="0" y="41" width="1000" height="1" fill="#333333"/>
  <text x="16" y="26" font-size="13" font-weight="600" fill="#dcddde">Vault heatmap</text>
  <text x="120" y="26" font-size="11" fill="#999999">coloured by last visited</text>

  <!-- legend: new -> gradient -> old + no-data pip -->
  <text x="690" y="26" font-size="10" fill="#999999">new</text>
  <rect x="718" y="17" width="14" height="8" rx="1" fill="#1db954"/>
  <rect x="732" y="17" width="14" height="8" rx="1" fill="#1c995e"/>
  <rect x="746" y="17" width="14" height="8" rx="1" fill="#1c7a67"/>
  <rect x="760" y="17" width="14" height="8" rx="1" fill="#1b5a71"/>
  <rect x="774" y="17" width="14" height="8" rx="1" fill="#1a3a7a"/>
  <text x="794" y="26" font-size="10" fill="#999999">old</text>
  <rect x="854" y="17" width="8" height="8" rx="2" fill="#1a1a20"/>
  <text x="868" y="26" font-size="10" fill="#999999">no data</text>

  <!-- ===================== treemap body ===================== -->

  <!-- ===== PROJECTS (folder, depth 1) ===== -->
  <rect x="8" y="50" width="462" height="360" rx="4" fill="#282828" stroke="#3a3a3a" stroke-width="1.5"/>
  <text x="15" y="66" font-size="10" font-weight="500" letter-spacing="1" fill="#8a8a8a">PROJECTS</text>

  <!-- nested subfolder web-app (depth 2) -->
  <rect x="13" y="72" width="220" height="332" rx="3" fill="#2d2d2d" stroke="#3a3a3a" stroke-width="0.75"/>
  <text x="19" y="86" font-size="9" letter-spacing="1" fill="#8a8a8a">WEB-APP</text>
  <g font-size="9" fill="#ffffff" fill-opacity="0.82" paint-order="stroke" stroke="#000000" stroke-opacity="0.5" stroke-width="2.5" stroke-linejoin="round">
    <rect x="18" y="92" width="200" height="72" rx="2" fill="#1db954" stroke="none"/><text x="24" y="106" stroke="none" fill-opacity="0.82">roadmap.md</text>
    <rect x="18" y="168" width="200" height="58" rx="2" fill="#1c995e" stroke="none"/><text x="24" y="182" stroke="none">api-design.md</text>
    <rect x="18" y="230" width="96" height="80" rx="2" fill="#1c7a67" stroke="none"/><text x="24" y="244" stroke="none">auth.md</text>
    <rect x="118" y="230" width="100" height="80" rx="2" fill="#1b5a71" stroke="none"/><text x="124" y="244" stroke="none">schema.md</text>
    <rect x="18" y="314" width="200" height="86" rx="2" fill="#1a3a7a" stroke="none"/><text x="24" y="328" stroke="none">changelog.md</text>
  </g>

  <!-- projects loose files -->
  <g font-size="9" fill="#ffffff">
    <rect x="237" y="72" width="228" height="148" rx="2" fill="#1c995e"/>
    <text x="243" y="86" fill-opacity="0.82" paint-order="stroke" stroke="#000000" stroke-opacity="0.5" stroke-width="2.5" stroke-linejoin="round">mobile-app.md</text>
    <rect x="237" y="224" width="110" height="90" rx="2" fill="#1c7a67"/>
    <text x="243" y="238" fill-opacity="0.82" paint-order="stroke" stroke="#000000" stroke-opacity="0.5" stroke-width="2.5" stroke-linejoin="round">flows.canvas</text>
    <rect x="351" y="224" width="114" height="90" rx="2" fill="#1c995e"/>
    <text x="357" y="238" fill-opacity="0.82" paint-order="stroke" stroke="#000000" stroke-opacity="0.5" stroke-width="2.5" stroke-linejoin="round">sketch.excalidraw</text>
    <rect x="237" y="318" width="228" height="86" rx="2" fill="#1a3a7a"/>
    <text x="243" y="332" fill-opacity="0.82" paint-order="stroke" stroke="#000000" stroke-opacity="0.5" stroke-width="2.5" stroke-linejoin="round">backlog.md</text>
  </g>

  <!-- ===== AREAS (folder, depth 1) ===== -->
  <rect x="8" y="418" width="462" height="214" rx="4" fill="#282828" stroke="#3a3a3a" stroke-width="1.5"/>
  <text x="15" y="434" font-size="10" font-weight="500" letter-spacing="1" fill="#8a8a8a">AREAS</text>
  <g font-size="9" fill="#ffffff" fill-opacity="0.82" paint-order="stroke" stroke="#000000" stroke-opacity="0.5" stroke-width="2.5" stroke-linejoin="round">
    <rect x="13" y="440" width="150" height="186" rx="2" fill="#1c7a67" stroke="none"/><text x="19" y="454" stroke="none">health.md</text>
    <rect x="167" y="440" width="140" height="186" rx="2" fill="#1b5a71" stroke="none"/><text x="173" y="454" stroke="none">finance.md</text>
    <rect x="311" y="440" width="154" height="90" rx="2" fill="#1c995e" stroke="none"/><text x="317" y="454" stroke="none">learning.md</text>
    <rect x="311" y="534" width="154" height="92" rx="2" fill="#1a3a7a" stroke="none"/><text x="317" y="548" stroke="none">career.md</text>
  </g>

  <!-- ===== DAILY (folder, depth 1) — journal, mostly recent ===== -->
  <rect x="478" y="50" width="514" height="250" rx="4" fill="#282828" stroke="#3a3a3a" stroke-width="1.5"/>
  <text x="485" y="66" font-size="10" font-weight="500" letter-spacing="1" fill="#8a8a8a">DAILY</text>
  <g font-size="8" fill="#ffffff" fill-opacity="0.82" paint-order="stroke" stroke="#000000" stroke-opacity="0.5" stroke-width="2px" stroke-linejoin="round">
    <rect x="483" y="72" width="98" height="70" rx="2" fill="#1db954" stroke="none"/><text x="488" y="85" stroke="none">2026-07-20.md</text>
    <rect x="585" y="72" width="98" height="70" rx="2" fill="#1db954" stroke="none"/><text x="590" y="85" stroke="none">2026-07-19.md</text>
    <rect x="687" y="72" width="98" height="70" rx="2" fill="#1c995e" stroke="none"/><text x="692" y="85" stroke="none">2026-07-18.md</text>
    <rect x="789" y="72" width="98" height="70" rx="2" fill="#1c995e" stroke="none"/><text x="794" y="85" stroke="none">2026-07-17.md</text>
    <rect x="891" y="72" width="96" height="70" rx="2" fill="#1c7a67" stroke="none"/><text x="896" y="85" stroke="none">2026-07-16.md</text>

    <rect x="483" y="146" width="98" height="70" rx="2" fill="#1c7a67" stroke="none"/><text x="488" y="159" stroke="none">2026-07-15.md</text>
    <rect x="585" y="146" width="98" height="70" rx="2" fill="#1b5a71" stroke="none"/><text x="590" y="159" stroke="none">2026-07-14.md</text>
    <rect x="687" y="146" width="98" height="70" rx="2" fill="#1b5a71" stroke="none"/><text x="692" y="159" stroke="none">2026-07-11.md</text>
    <rect x="789" y="146" width="98" height="70" rx="2" fill="#1a3a7a" stroke="none"/><text x="794" y="159" stroke="none">2026-07-06.md</text>
    <rect x="891" y="146" width="96" height="70" rx="2" fill="#1a3a7a" stroke="none"/><text x="896" y="159" stroke="none">2026-06-28.md</text>

    <rect x="483" y="220" width="98" height="74" rx="2" fill="#1a3a7a" stroke="none"/><text x="488" y="233" stroke="none">2026-06-14.md</text>
    <rect x="585" y="220" width="98" height="74" rx="2" fill="#1a1a20" stroke="none"/><text x="590" y="233" stroke="none" fill-opacity="0.5">2026-05-30.md</text>
    <rect x="687" y="220" width="98" height="74" rx="2" fill="#1a3a7a" stroke="none"/><text x="692" y="233" stroke="none">2026-05-12.md</text>
    <rect x="789" y="220" width="98" height="74" rx="2" fill="#1a1a20" stroke="none"/><text x="794" y="233" stroke="none" fill-opacity="0.5">2026-04-27.md</text>
    <rect x="891" y="220" width="96" height="74" rx="2" fill="#1a3a7a" stroke="none"/><text x="896" y="233" stroke="none">2026-04-02.md</text>
  </g>

  <!-- ===== ARCHIVE (folder, depth 1) — old, unvisited ===== -->
  <rect x="478" y="308" width="514" height="120" rx="4" fill="#282828" stroke="#3a3a3a" stroke-width="1.5"/>
  <text x="485" y="324" font-size="10" font-weight="500" letter-spacing="1" fill="#8a8a8a">ARCHIVE</text>
  <g font-size="9" fill="#ffffff" fill-opacity="0.82" paint-order="stroke" stroke="#000000" stroke-opacity="0.5" stroke-width="2.5" stroke-linejoin="round">
    <rect x="483" y="330" width="150" height="94" rx="2" fill="#1a3a7a" stroke="none"/><text x="489" y="344" stroke="none">2024-review.md</text>
    <rect x="637" y="330" width="120" height="94" rx="2" fill="#1a1a20" stroke="none"/><text x="643" y="344" stroke="none" fill-opacity="0.5">old-notes.md</text>
    <rect x="761" y="330" width="110" height="94" rx="2" fill="#1a3a7a" stroke="none"/><text x="767" y="344" stroke="none">wireframe.canvas</text>
    <rect x="875" y="330" width="112" height="94" rx="2" fill="#1a1a20" stroke="none"/><text x="881" y="344" stroke="none" fill-opacity="0.5">scratch.md</text>
  </g>

  <!-- ===== RESOURCES (folder, depth 1) ===== -->
  <rect x="478" y="436" width="514" height="196" rx="4" fill="#282828" stroke="#3a3a3a" stroke-width="1.5"/>
  <text x="485" y="452" font-size="10" font-weight="500" letter-spacing="1" fill="#8a8a8a">RESOURCES</text>
  <g font-size="9" fill="#ffffff" fill-opacity="0.82" paint-order="stroke" stroke="#000000" stroke-opacity="0.5" stroke-width="2.5" stroke-linejoin="round">
    <rect x="483" y="458" width="160" height="168" rx="2" fill="#1c995e" stroke="none"/><text x="489" y="472" stroke="none">reading-list.md</text>
    <rect x="647" y="458" width="180" height="80" rx="2" fill="#1a3a7a" stroke="none"/><text x="653" y="472" stroke="none">clippings.md</text>
    <rect x="647" y="542" width="180" height="84" rx="2" fill="#1a1a20" stroke="none"/><text x="653" y="556" stroke="none" fill-opacity="0.5">web-clips.md</text>
    <rect x="831" y="458" width="156" height="80" rx="2" fill="#1c7a67" stroke="none"/><text x="837" y="472" stroke="none">diagram.excalidraw</text>
    <rect x="831" y="542" width="156" height="84" rx="2" fill="#1b5a71" stroke="none"/><text x="837" y="556" stroke="none">references.canvas</text>
  </g>
</svg>
