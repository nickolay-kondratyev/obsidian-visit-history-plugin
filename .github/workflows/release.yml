name: Release Obsidian plugin

on:
    push:
        tags:
            - '*'

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write
            attestations: write
        steps:
            - uses: actions/checkout@v6
              with:
                  submodules: recursive

            - name: Use Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: 'npm'

            - name: Build plugin
              run: |
                  npm ci --ignore-scripts
                  npm run build

            - name: Check for optional styles
              id: styles
              run: |
                  [ -f styles.css ] && echo "exists=true" >> "$GITHUB_OUTPUT" || echo "exists=false" >> "$GITHUB_OUTPUT"

            - name: Verify tag matches manifest version
              run: |
                  tag="${GITHUB_REF#refs/tags/}"
                  manifest_version="$(jq -r .version manifest.json)"
                  if [ "$tag" != "$manifest_version" ]; then
                    echo "Tag ($tag) != manifest version ($manifest_version)" >&2
                    exit 1
                  fi

            - name: Generate checksums
              run: |
                  files="main.js manifest.json"
                  [ -f styles.css ] && files="$files styles.css"
                  sha256sum $files > SHA256SUMS

            - name: Attest build provenance
              uses: actions/attest@v4
              with:
                  subject-path: |
                      main.js
                      SHA256SUMS
                      ${{ steps.styles.outputs.exists == 'true' && 'styles.css' || '' }}

            - name: Create release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  tag="${GITHUB_REF#refs/tags/}"

                  gh release create "$tag" \
                    --title="$tag" \
                    --latest \
                    main.js manifest.json SHA256SUMS ${{ steps.styles.outputs.exists == 'true' && 'styles.css' || '' }}
