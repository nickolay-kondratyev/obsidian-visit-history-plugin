  │ Prototype (CDN)             │ Plugin                              │
  ├─────────────────────────────┼─────────────────────────────────────┤

// hot  = color applied to newest files (≤ hotDays old)
// cold = color applied to oldest files (≥ coldDays old)
// nil  = color for null/missing timestamp ("no data")
const GRADIENTS = {
  nature: { label:"Nature", sub:"green → blue", hot:"#1db954", cold:"#1a3a7a", nil:"#1a1a20" },
  ember:  { label:"Ember",  sub:"red → ice",    hot:"#e84020", cold:"#0a1e58", nil:"#111118" },

// ─────────────────────────────────────────────────────────────────
// PURE FUNCTIONS  →  src/vault-treemap/utils.ts

// heatColor / leafFill / leafOpacity are the rendering hot-path —
// keep them out of component files for easy unit testing.
// ─────────────────────────────────────────────────────────────────

// Returns the fill color for a leaf given a timestamp and thresholds.
function heatColor(ts, gradKey, hotDays, coldDays) {
  const g = GRADIENTS[gradKey];
  if (ts == null) return g.nil;
  const daysOld = (Date.now() - ts) / 86400000;
  if (daysOld <= hotDays)  return g.hot;
  if (daysOld >= coldDays) return g.cold;
  return d3.interpolateRgb(g.hot, g.cold)((daysOld - hotDays) / (coldDays - hotDays));
}

// Resolves the fill color for a leaf depending on active color mode.
function leafFill(d, hovered, colorMode, gradKey, field, hotDays, coldDays) {
  if (colorMode === "heatmap") {
    const base = heatColor(d.data[field], gradKey, hotDays, coldDays);
    return (hovered && d.data[field] != null)
      ? d3.color(base).brighter(0.45).formatHex()
      : base;
  }
  const c = TYPE_C[d.data.type] || { fill:"#555", hover:"#777" };
  return hovered ? c.hover : c.fill;
}

// Opacity is reduced for null-timestamp cells to visually signal "no data".
function leafOpacity(d, colorMode, field) {
  if (colorMode === "heatmap") return d.data[field] == null ? 0.55 : 0.88;
  return 0.78;
}

function fmtBytes(b) {
  if (b < 1024)    return `${b} B`;
  if (b < 1048576) return `${(b/1024).toFixed(1)} KB`;
  return `${(b/1048576).toFixed(2)} MB`;
}

function fmtDate(ts) {
  if (ts == null) return null;
  const d = Math.round((Date.now() - ts) / 86400000);
  const rel = d === 0 ? "today" : d === 1 ? "yesterday" : `${d}d ago`;
  return `${new Date(ts).toISOString().slice(0,10)} (${rel})`;
}

// Builds the display path string from a D3 hierarchy node's ancestors.
function nodePath(d) {
  return d.ancestors().reverse().slice(1).map(a => a.data.name).join(" / ");
}

// ─────────────────────────────────────────────────────────────────
function Header({ colorMode, gradKey, field, stats, onConfigToggle }) {
  return html`<div id="header">
    <span id="title">Vault Treemap</span>
    <div className="stats">
      <span className="stat"><strong>${stats.files}</strong> files</span>
      <span className="stat"><strong>${stats.folders}</strong> folders</span>
      <span className="stat"><strong>${stats.size}</strong> raw</span>
    </div>
    ${colorMode === "heatmap" && html`
      <div className="ts-indicator">
        field: <strong>${FIELD_LABELS[field] || field}</strong>
      </div>
    `}
    <div className="spacer"></div>
    <${Legend} colorMode=${colorMode} gradKey=${gradKey}/>
    <button className="header-btn" onClick=${onConfigToggle}>⚙ config</button>
  </div>`;
}

// ─────────────────────────────────────────────────────────────────
// COMPONENT: GradientPicker  →  src/vault-treemap/components/ConfigPanel/GradientPicker.tsx
// Pure display — no state. Copy as-is.
// ─────────────────────────────────────────────────────────────────
function GradientPicker({ active, onChange }) {
  return html`<div className="grad-row">
    ${Object.entries(GRADIENTS).map(([key, g]) => html`
      <button
        key=${key}
        className=${"grad-btn" + (key === active ? " active" : "")}
        onClick=${() => onChange(key)}
      >
        <div className="grad-swatch"
          style=${{ background:`linear-gradient(to right,${g.hot},${g.cold})` }}>
        </div>
        ${g.label}<br/>
        <span style="font-size:8px;opacity:.55">${g.sub}</span>
      </button>
    `)}
  </div>`;
}

// ─────────────────────────────────────────────────────────────────
// COMPONENT: HeatmapOptions  →  src/vault-treemap/components/ConfigPanel/HeatmapOptions.tsx
// Pure config UI — no state (fully controlled by parent). Copy as-is.
// ─────────────────────────────────────────────────────────────────
function HeatmapOptions({ field, setField, gradKey, setGradKey, hotDays, setHotDays, coldDays, setColdDays }) {
  const g = GRADIENTS[gradKey];
  // Mono gradient has near-white/near-black endpoints; dim them for dark-bg legibility.
  const hotColor  = g.hot  === "#d8d8d8" ? "#888888" : g.hot;
  const coldColor = g.cold === "#1c1c1c" ? "#666666" : g.cold;

  function onHotInput(e) {
    const v = Math.min(parseInt(e.target.value), coldDays - 1);
    setHotDays(v);
  }
  function onColdInput(e) {
    const v = Math.max(parseInt(e.target.value), hotDays + 1);
    setColdDays(v);
  }

  return html`<div>
    <div className="cfg-label" style="margin-bottom:6px">Timestamp field</div>
    <select className="cfg-select" value=${field} onChange=${e => setField(e.target.value)}>
      ${Object.entries(FIELD_LABELS).map(([val, label]) => html`
        <option key=${val} value=${val}>${label}</option>
      `)}
    </select>

    <div className="cfg-label" style="margin-bottom:8px">Gradient</div>
    <${GradientPicker} active=${gradKey} onChange=${setGradKey}/>

    <div className="slider-wrap">
      <div className="slider-label-row">
        <span style=${{ color: hotColor }}>hot / new</span>
        <span>${hotDays} days</span>
      </div>
      <input type="range" min="1" max="365" step="1"
        value=${hotDays} onInput=${onHotInput}/>
    </div>

    <div className="slider-wrap">
      <div className="slider-label-row">
        <span style=${{ color: coldColor }}>cold / old</span>
        <span>${coldDays} days</span>
      </div>
      <input type="range" min="2" max="730" step="1"
        value=${coldDays} onInput=${onColdInput}/>
    </div>

    <div className="grad-preview"
      style=${{ background:`linear-gradient(to right,${g.hot},${g.cold})` }}>
    </div>
    <div className="grad-ends"><span>← newer</span><span>older →</span></div>
    <div className="null-row">
      <div className="null-pip" style=${{ background: g.nil }}></div>
      <span>null / missing timestamp</span>
    </div>
  </div>`;
}

// ─────────────────────────────────────────────────────────────────
// COMPONENT: ConfigPanel  →  src/vault-treemap/components/ConfigPanel/index.tsx
// Pure config UI — no state (all controlled by App). Copy as-is.
// ─────────────────────────────────────────────────────────────────
function ConfigPanel({ open, colorMode, setColorMode, gradKey, setGradKey, field, setField,
                       hotDays, setHotDays, coldDays, setColdDays, scales, setScales }) {
  function updateScale(type, val) {
    setScales(prev => ({ ...prev, [type]: parseFloat(val) || 1 }));
  }

  return html`<div id="config" className=${open ? "open" : ""}>
    <div className="cfg-h">Scale factors</div>
    ${Object.entries(TYPE_C).map(([type, c]) => html`
      <div key=${type} className="cfg-row">
        <span className="cfg-label">
          <span className="cfg-pip" style=${{ background: c.fill }}></span>
          .${type}
        </span>
        <input className="cfg-input" type="number"
          value=${scales[type]} min="0.01" step="0.05"
          onChange=${e => updateScale(type, e.target.value)}
        />
      </div>
    `)}

    <hr className="cfg-sep"/>

    <div className="cfg-h">Coloring</div>
    <div className="mode-row">
      <button className=${"mode-btn" + (colorMode==="type"    ? " active" : "")} onClick=${() => setColorMode("type")}>By type</button>
      <button className=${"mode-btn" + (colorMode==="heatmap" ? " active" : "")} onClick=${() => setColorMode("heatmap")}>Heatmap</button>
    </div>

    ${colorMode === "heatmap" && html`
      <${HeatmapOptions}
        field=${field}       setField=${setField}
        gradKey=${gradKey}   setGradKey=${setGradKey}
        hotDays=${hotDays}   setHotDays=${setHotDays}
        coldDays=${coldDays} setColdDays=${setColdDays}
      />
    `}
  </div>`;
}

// ─────────────────────────────────────────────────────────────────
// COMPONENT: Tooltip  →  src/vault-treemap/components/Tooltip.tsx
// Pure display — no state. Copy as-is.
// PLUGIN: position:fixed works inside Obsidian's leaf panel.
// ─────────────────────────────────────────────────────────────────
function Tooltip({ x, y, node, scales }) {
  const d   = node;
  const c   = TYPE_C[d.data.type] || {};
  const eff = Math.round(d.data.size * (scales[d.data.type] || 1));

  // Inner helper: one timestamp row, italicised if null.
  function TsRow({ label, ts }) {
    const fmt = fmtDate(ts);
    return html`<div className="tt-row">
      <span>${label}</span>
      <span className=${"tt-val" + (fmt ? "" : " tt-null")}>${fmt || "—"}</span>
    </div>`;
  }

  return html`<div id="tooltip" style=${{ left:x+"px", top:y+"px" }}>
    <div className="tt-name">${d.data.name}</div>
    <div className="tt-row">
      <span>type</span>
      <span className="tt-val">
        <span className="tt-badge" style=${{
          background: (c.badge||"#333") + "55",
          color:      c.fg || "#aaa",
          border:     "1px solid " + (c.badge||"#333"),
        }}>.${d.data.type}</span>
      </span>
    </div>
    <div className="tt-row"><span>path</span><span className="tt-val">${nodePath(d)}</span></div>
    <div className="tt-row"><span>raw</span><span className="tt-val">${fmtBytes(d.data.size)}</span></div>
    <div className="tt-row"><span>effective</span><span className="tt-val">${fmtBytes(eff)} (×${scales[d.data.type]||1})</span></div>
    <hr className="tt-sep"/>
    <${TsRow} label="created"  ts=${d.data.createdAt}/>
    <${TsRow} label="modified" ts=${d.data.lastModifiedAt}/>
    <${TsRow} label="visited"  ts=${d.data.lastVisitedAt}/>
  </div>`;
}

// ─────────────────────────────────────────────────────────────────
// COMPONENT: FolderNode  →  src/vault-treemap/components/FolderNode.tsx
// Pure SVG — no state, no event handlers. Copy as-is.
// PLUGIN: SVG attribute names need camelCase in JSX:
//   font-family → fontFamily   stroke-width → strokeWidth
//   font-size   → fontSize     font-weight  → fontWeight
//   letter-spacing → letterSpacing
// ─────────────────────────────────────────────────────────────────
function FolderNode({ d }) {
  const w = Math.max(0, d.x1 - d.x0);
  const h = Math.max(0, d.y1 - d.y0);
  // Nested <svg overflow="hidden"> clips the label text — no clipPath needed.
  return html`
    <svg x=${d.x0} y=${d.y0} width=${w} height=${h} overflow="hidden">
      <rect width=${w} height=${h}
        fill=${d3.interpolateRgb("#0c0c0f","#28283a")(d.depth * 0.18)}
        stroke=${d.depth===1 ? "#2e2e3e" : "#222230"}
        stroke-width=${d.depth===1 ? 1.5 : 0.75}
      />
      ${h > 14 && html`
        <text
          x=${5} y=${d.depth===1 ? 14 : 12}
          font-family="'IBM Plex Mono',monospace"
          font-size=${d.depth===1 ? 10 : 9}
          font-weight=${d.depth===1 ? 500 : 400}
          letter-spacing="0.1em"
          fill="#505062"
        >${d.data.name.toUpperCase()}</text>
      `}
    </svg>`;
}

// ─────────────────────────────────────────────────────────────────
// COMPONENT: LeafNode  →  src/vault-treemap/components/LeafNode.tsx
// Pure SVG — hover state owned by parent (TreemapViz). Copy as-is.
// PLUGIN: same SVG camelCase note as FolderNode above.
// PLUGIN: add onClick → open file in Obsidian:
//   onClick={() => app.workspace.openLinkText(d.data.path, '')}
// ─────────────────────────────────────────────────────────────────
function LeafNode({ d, hovered, colorMode, gradKey, field, hotDays, coldDays, onMouseMove, onMouseLeave }) {
  const lw      = Math.max(0, d.x1 - d.x0);
  const lh      = Math.max(0, d.y1 - d.y0);
  const fill    = leafFill(d, hovered, colorMode, gradKey, field, hotDays, coldDays);
  const opacity = hovered ? 1 : leafOpacity(d, colorMode, field);

  return html`
    <svg x=${d.x0} y=${d.y0} width=${lw} height=${lh} overflow="hidden"
         onMouseMove=${onMouseMove} onMouseLeave=${onMouseLeave} style="cursor:pointer">
      <rect width=${lw} height=${lh} rx=${2}
        fill=${fill} fill-opacity=${opacity}
        stroke=${hovered ? "rgba(255,255,255,0.4)" : "none"}
        stroke-width=${1}
      />
      ${lw > 32 && lh > 14 && html`
        <text x=${3} y=${11}
          font-family="'IBM Plex Mono',monospace"
          font-size=${9}
          fill="rgba(255,255,255,0.65)"
        >${d.data.name}</text>
      `}
    </svg>`;
}

// ─────────────────────────────────────────────────────────────────
// COMPONENT: TreemapView  →  src/vault-treemap/components/TreemapViz.tsx
// Renamed to TreemapViz in the plugin to avoid collision with Obsidian's
// ItemView class which also gets called *View.
//
// Owns: container dimensions, D3 zoom ref, hover state, tooltip state.
// Receives: all rendering config as props; data as a prop (not hardcoded).
//
// D3 BOUNDARY NOTE — two distinct D3 roles here:
//
//   1. useMemo (layout math, lines below):
//      d3.hierarchy + d3.treemap = pure computation, no DOM access.
//      React re-runs this automatically when scales/dims change.
//      No changes needed when porting.
//
//   2. useEffect (zoom, lines below):
//      D3 zoom attaches event listeners and mutates the <g> transform
//      attribute DIRECTLY — bypassing React's VDOM entirely.
//      This is the one intentional "escape hatch" in the component.
//      PLUGIN: replace with @visx/zoom to keep transform in React state.
//      See integration-plan.md §D3/React boundary for the swap sketch.
//
// PLUGIN: DATA const below becomes the `data` prop passed from App,
//   which receives it from the Obsidian vault adapter.
// ─────────────────────────────────────────────────────────────────
function TreemapView({ colorMode, gradKey, field, hotDays, coldDays, scales, onStatsChange }) {
  const containerRef = useRef(null);
  const svgRef       = useRef(null);
  const gRef         = useRef(null);
  const zoomRef      = useRef(null); // PLUGIN: remove when using @visx/zoom

  const [dims,       setDims]       = useState({ w:800, h:600 });
  const [hoveredIdx, setHoveredIdx] = useState(null);
  const [tooltip,    setTooltip]    = useState(null); // { x, y, node }

  // Track container size — works unchanged inside an Obsidian ItemView.
  useEffect(() => {
    const obs = new ResizeObserver(entries => {
      const r = entries[0].contentRect;
      setDims({ w: Math.floor(r.width), h: Math.floor(r.height) });
    });
    obs.observe(containerRef.current);
    return () => obs.disconnect();
  }, []);

  // PLUGIN: replace this entire useEffect with @visx/zoom.
  // D3 zoom — attaches once; all subsequent mutations go directly to the DOM.
  // React never knows the <g> transform changed, which is intentional:
  // reconciliation only touches props declared in JSX, not attrs set via ref.
  useEffect(() => {
    const zoom = d3.zoom()
      .scaleExtent([0.05, 30])
      .on("zoom", ev => {
        if (gRef.current) gRef.current.setAttribute("transform", ev.transform);
      });
    d3.select(svgRef.current)
      .call(zoom)
      .on("dblclick.zoom", () => {
        d3.select(svgRef.current).transition().duration(400)
          .call(zoom.transform, d3.zoomIdentity);
      });
    zoomRef.current = zoom;
  }, []);

  // D3 treemap layout — pure math inside useMemo, no DOM access.
  // PLUGIN: replace DATA with the `data` prop.
  const { folders, leaves } = useMemo(() => {
    const { w, h } = dims;
    if (!w || !h) return { folders:[], leaves:[] };

    const root = d3.hierarchy(DATA) // PLUGIN: DATA → data prop
      .sum(d => d.children ? 0 : Math.max(1, Math.round(d.size * (scales[d.type] || 1))))
      .sort((a, b) => b.value - a.value);

    d3.treemap()
      .tile(d3.treemapSquarify)
      .size([w, h])
      .paddingOuter(8)
      .paddingTop(d => d.depth === 0 ? 0 : d.depth === 1 ? 20 : 16)
      .paddingInner(2)
      .round(true)
      (root);

    return {
      folders: root.descendants().filter(d => d.depth > 0 && d.children),
      leaves:  root.leaves(),
    };
  }, [scales, dims]); // PLUGIN: add `data` to dep array

  // Bubble stats up to Header whenever the layout changes.
  useEffect(() => {
    onStatsChange({
      files:   leaves.length,
      folders: folders.length,
      size:    fmtBytes(leaves.reduce((s, d) => s + d.data.size, 0)),
    });
  }, [leaves, folders, onStatsChange]);

  function handleLeafMove(e, d, i) {
    if (hoveredIdx !== i) setHoveredIdx(i);
    const TW=230, TH=165, cx=e.clientX, cy=e.clientY;
    setTooltip({
      x: cx+16+TW > window.innerWidth  ? cx-TW-8 : cx+16,
      y: cy-12+TH > window.innerHeight ? cy-TH-4 : cy-12,
      node: d,
    });
  }

  function handleLeafLeave() {
    setHoveredIdx(null);
    setTooltip(null);
  }

  function resetZoom() {
    // PLUGIN: with @visx/zoom call zoom.reset() instead.
    d3.select(svgRef.current).transition().duration(400)
      .call(zoomRef.current.transform, d3.zoomIdentity);
  }

  return html`<div id="viz" ref=${containerRef}>
    <svg ref=${svgRef}>
      <g ref=${gRef}>
        ${folders.map((d, i) => html`<${FolderNode} key=${"f"+i} d=${d}/>`)}
        ${leaves.map((d, i)  => html`<${LeafNode}
          key=${"l"+i} d=${d}
          hovered=${hoveredIdx === i}
          colorMode=${colorMode} gradKey=${gradKey} field=${field}
          hotDays=${hotDays} coldDays=${coldDays}
          onMouseMove=${e => handleLeafMove(e, d, i)}
          onMouseLeave=${handleLeafLeave}
        />`)}
      </g>
    </svg>
    ${tooltip && html`<${Tooltip} ...${tooltip} scales=${scales}/>`}
    <div id="hint">scroll · zoom &nbsp;|&nbsp; drag · pan &nbsp;|&nbsp; dbl-click · reset</div>
    <button className="zoom-reset" onClick=${resetZoom}>reset zoom</button>
  </div>`;
}

// ─────────────────────────────────────────────────────────────────
// COMPONENT: App  →  src/vault-treemap/components/App.tsx
//
// Owns all config state. No Obsidian API access — deliberately kept
// ignorant of Obsidian so the component tree is independently testable.
//
// PLUGIN: App receives `data` (the vault tree) as a prop from the
//   ItemView. The ItemView calls buildVaultTree(vault) and passes the
//   result here. On vault change events, the ItemView refreshes the
//   data prop, triggering a re-render automatically.
//
//   function App({ data }: { data: VaultNode }) { ... }
//   Pass `data` through to TreemapViz.
// ─────────────────────────────────────────────────────────────────
function App() {
  const [colorMode,   setColorMode]  = useState("heatmap");
  const [gradKey,     setGradKey]    = useState("nature");
  const [field,       setField]      = useState("lastModifiedAt");
  const [hotDays,     setHotDays]    = useState(7);
  const [coldDays,    setColdDays]   = useState(180);
  const [scales,      setScales]     = useState({ md:1.0, canvas:0.3, excalidraw:0.2 });
  const [configOpen,  setConfigOpen] = useState(false);
  const [stats,       setStats]      = useState({ files:0, folders:0, size:"—" });

  return html`<${Fragment}>
    <${Header}
      colorMode=${colorMode} gradKey=${gradKey} field=${field}
      stats=${stats}
      onConfigToggle=${() => setConfigOpen(o => !o)}
    />
    <${ConfigPanel}
      open=${configOpen}
      colorMode=${colorMode}   setColorMode=${setColorMode}
      gradKey=${gradKey}       setGradKey=${setGradKey}
      field=${field}           setField=${setField}
      hotDays=${hotDays}       setHotDays=${setHotDays}
      coldDays=${coldDays}     setColdDays=${setColdDays}
      scales=${scales}         setScales=${setScales}
    />
    <${TreemapView}
      colorMode=${colorMode} gradKey=${gradKey} field=${field}
      hotDays=${hotDays}     coldDays=${coldDays}
      scales=${scales}
      onStatsChange=${setStats}
    />
  <//>`;
}
